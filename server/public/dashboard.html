<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalMap Founder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        #map { height: 400px; border-radius: 12px; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">SignalMap <span class="text-emerald-500">B2B Engine</span></h1>
                <p class="text-slate-500 font-medium">Live Operator Coverage Aggregation</p>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-sm text-slate-500 uppercase font-bold tracking-wider">Total Data Points</p>
                    <p class="text-2xl font-black text-slate-800" id="stat-total">0</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="col-span-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                <div id="map"></div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                <h3 class="text-lg font-bold text-slate-800 mb-4">Latest Raw Readings</h3>
                <div class="flex-1 overflow-y-auto space-y-3" id="feed-container" style="max-height: 350px;">
                    <!-- Feed items injected here -->
                    <p class="text-sm text-slate-400 text-center mt-10">Loading DePIN data...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use a mock token to fetch if not implemented full auth on dashboard
        const MOCK_TOKEN = 'dev-token-dashboard';
        
        async function loadData() {
            try {
                const res = await fetch('/api/admin/raw-data', {
                    headers: { 'Authorization': `Bearer ${MOCK_TOKEN}` }
                });
                const { data } = await res.json();
                
                document.getElementById('stat-total').innerText = data.length;

                // Heatmap Data
                const heatPoints = data.map(d => [d.lat, d.lng, Math.abs(d.signal_dbm || 90) / 100]);
                
                // Initialize Map
                const map = L.map('map').setView([31.2304, 121.4737], 11);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO'
                }).addTo(map);

                L.heatLayer(heatPoints, {radius: 20, blur: 15, maxZoom: 17}).addTo(map);

                // Feed
                const feed = document.getElementById('feed-container');
                feed.innerHTML = '';
                data.slice(0, 15).forEach(d => {
                    const color = d.signal_dbm > -85 ? 'text-emerald-500' : (d.signal_dbm > -105 ? 'text-amber-500' : 'text-red-500');
                    feed.innerHTML += `
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center transition hover:bg-slate-100">
                            <div>
                                <p class="font-bold text-slate-700 text-sm">${d.carrier || 'Unknown'} <span class="text-xs bg-slate-200 px-2 py-0.5 rounded-full ml-1">${d.technology || 'N/A'}</span></p>
                                <p class="text-xs text-slate-400 font-mono mt-1">${d.lat.toFixed(4)}, ${d.lng.toFixed(4)} · ${d.speed_down ? d.speed_down + ' Mbps' : 'speed n/a'}</p>
                                <p class="text-[10px] text-slate-400 font-mono mt-1">receipt: ${d.trust_receipt_id || 'pending'}</p>
                            </div>
                            <div class="font-black ${color} flex items-center gap-1">
                                ${d.signal_dbm} dBm
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Failed to load data", err);
            }
        }
        
        loadData();
    </script>
</body>
</html>
